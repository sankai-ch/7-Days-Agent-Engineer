dashscope:
  api-key:
  embedding-model: text-embedding-v3
  chat-model: qwen-plus
  base-url:

spring:
  datasource:
    url:
    username:
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 600000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

rag:
  knowledge:
    path: /Users/sankai/Library/Mobile Documents/iCloud~md~obsidian/Documents/everything/Java/面试题
    classpath-pattern: classpath:knowledge/*.md
  retrieval:
    top-k: 3

# =====================================================
# Day 3：MCP Server 配置
# =====================================================
mcp:
  server:
    name: agent-mcp-server               # MCP 服务器名称
    version: 1.0.0                        # MCP 服务器版本号
    auth-token: mcp-day3-token-2024       # 鉴权 Token（留空则跳过鉴权）

# =====================================================
# Day 3：Agent 配置（单 Agent 模式）
# =====================================================
agent:
  max-tool-rounds: 3                      # Agent 单次对话最大工具调用轮次

# =====================================================
# Day 4：编排流水线配置（三角色协作模式）
# =====================================================
orchestration:
  max-supplement-rounds: 1                # Reviewer 要求补充时最多允许几轮补充执行

resilience4j:
  retry:
    instances:
      embedding:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
