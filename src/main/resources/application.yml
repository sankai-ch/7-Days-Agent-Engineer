dashscope:
  api-key:
  embedding-model: text-embedding-v3
  chat-model: qwen-plus
  base-url:

spring:
  datasource:
    url:
    username:
    password:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      max-lifetime: 600000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

rag:
  knowledge:
    path: /Users/sankai/Library/Mobile Documents/iCloud~md~obsidian/Documents/everything/Java/面试题
    classpath-pattern: classpath:knowledge/*.md
  retrieval:
    top-k: 3

# =====================================================
# Day 3：MCP Server 配置
# =====================================================
mcp:
  server:
    name: agent-mcp-server               # MCP 服务器名称
    version: 1.0.0                        # MCP 服务器版本号
    auth-token: mcp-day3-token-2024       # 鉴权 Token（留空则跳过鉴权）

# =====================================================
# Day 3：Agent 配置（单 Agent 模式）
# =====================================================
agent:
  max-tool-rounds: 3                      # Agent 单次对话最大工具调用轮次

# =====================================================
# Day 4：编排流水线配置（三角色协作模式）
# =====================================================
orchestration:
  max-supplement-rounds: 1                # Reviewer 要求补充时最多允许几轮补充执行

# =====================================================
# Day 5：可观测与评测配置
# =====================================================
observability:
  trace-buffer-size: 200                  # 内存中保留最近多少条 Trace
  cost:
    input-price-per-1k: 0.0008            # 输入价格：元/千token（qwen-plus）
    output-price-per-1k: 0.002            # 输出价格：元/千token（qwen-plus）

# =====================================================
# Day 6：安全与稳定性配置
# =====================================================
security:
  rate-limit:
    max-requests-per-minute: 30           # 每分钟最大请求数（每 IP）
  circuit-breaker:
    failure-threshold: 5                  # 连续失败几次后触发熔断
    cooldown-ms: 30000                    # 熔断冷却时间（毫秒）
  idempotency:
    cache-ttl-ms: 60000                   # 幂等缓存过期时间（毫秒）

resilience4j:
  retry:
    instances:
      embedding:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
